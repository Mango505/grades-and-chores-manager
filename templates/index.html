<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notenrechner</title>

  <script type="importmap">
    { "imports": { "@material/web/": "https://esm.run/@material/web/" } }
  </script>
  <script type="module">
    import "@material/web/all.js";
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
  <link rel="stylesheet" href="/static/css/app.css" />

  <link rel="manifest" href="/static/manifest.json" />
  <meta name="theme-color" content="#006874" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#003741"  media="(prefers-color-scheme: dark)" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Notenrechner" />
</head>
<body>

  <!-- =====================================================================
       DESKTOP: Navigation Drawer
       ===================================================================== -->
  <nav class="nav-drawer" id="navDrawer" aria-label="Hauptnavigation">
    <div class="nav-drawer__header">
      <span class="material-symbols-rounded nav-drawer__logo">school</span>
      <span class="nav-drawer__title">Notenrechner</span>
    </div>

    <!-- Extended FAB – primary action of the current page -->
    <button class="nav-fab" id="navFab" hidden>
      <span class="material-symbols-rounded" id="navFabIcon">add</span>
      <span id="navFabLabel"></span>
    </button>

    <ul class="nav-drawer__list" role="list">
      <li><a href="#overview"  class="nav-item nav-item--active" data-page="overview">
        <span class="material-symbols-rounded">bar_chart</span> Übersicht
      </a></li>
      <li><a href="#wallet"    class="nav-item" data-page="wallet">
        <span class="material-symbols-rounded">account_balance_wallet</span> Konto &amp; Verlauf
      </a></li>
      <li><a href="#stats"     class="nav-item" data-page="stats">
        <span class="material-symbols-rounded">insights</span> Statistiken
      </a></li>
      <li><a href="#settings"  class="nav-item" data-page="settings">
        <span class="material-symbols-rounded">settings</span> Einstellungen
      </a></li>
    </ul>

    <div class="nav-drawer__footer">
      <button class="theme-toggle" id="themeToggle" aria-label="Design wechseln">
        <span class="material-symbols-rounded" id="themeIcon">dark_mode</span>
        <span id="themeLabel">Dark Mode</span>
      </button>
    </div>
  </nav>

  <!-- =====================================================================
       MAIN CONTENT
       ===================================================================== -->
  <main class="main-content" id="mainContent">

    <!-- Top app bar – mobile only, no hamburger, no shadow -->
    <header class="top-app-bar" id="topAppBar">
      <span class="top-app-bar__title" id="pageTitle">Übersicht</span>
      <div class="top-app-bar__actions">
        <button class="icon-btn" id="themeToggleMobile" aria-label="Design wechseln">
          <span class="material-symbols-rounded" id="themeIconMobile">dark_mode</span>
        </button>
      </div>
    </header>

    <div class="page-container" id="pageContainer">
      <div class="page-placeholder">
        <span class="material-symbols-rounded page-placeholder__icon">school</span>
        <p>Lade Daten…</p>
      </div>
    </div>
  </main>

  <!-- =====================================================================
       MOBILE: Bottom Navigation
       ===================================================================== -->
  <nav class="bottom-nav" aria-label="Hauptnavigation">
    <a href="#overview"  class="bottom-nav__item bottom-nav__item--active" data-page="overview">
      <span class="material-symbols-rounded">bar_chart</span><span>Übersicht</span>
    </a>
    <a href="#wallet"    class="bottom-nav__item" data-page="wallet">
      <span class="material-symbols-rounded">account_balance_wallet</span><span>Konto</span>
    </a>
    <a href="#stats"     class="bottom-nav__item" data-page="stats">
      <span class="material-symbols-rounded">insights</span><span>Statistiken</span>
    </a>
    <a href="#settings"  class="bottom-nav__item" data-page="settings">
      <span class="material-symbols-rounded">settings</span><span>Mehr</span>
    </a>
  </nav>

  <!-- Mobile floating FAB -->
  <button class="mob-fab" id="mobFab" hidden aria-label="Primäre Aktion">
    <span class="material-symbols-rounded" id="mobFabIcon">add</span>
  </button>

  <!-- Drawer backdrop (mobile only) -->
  <div class="drawer-backdrop" id="drawerBackdrop"></div>

  <script src="/static/js/app.js" type="module"></script>
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/static/sw.js")
        .catch(e => console.warn("SW:", e));
    }
  </script>
</body>
</html>
